name: Build CP JSON

on:
  push:
    paths:
      - 'data/cp_uc_base.csv'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install csv-parser fs

      - name: Convert CSV to JSON
        run: |
          node << 'EOF'
          const fs = require('fs');
          const csv = require('csv-parser');

          const results = {};

          fs.createReadStream('data/cp_uc_base.csv')
            .pipe(csv())
            .on('data', (row) => {
              const cp = row['Certificat de Professionalitat'];
              if (!cp) return;

              if (!results[cp]) {
                results[cp] = {
                  codi: cp,
                  nom: row['Descripció'],
                  nivell: row['NivellEspecialitat'],
                  familia: row['FamProfDescCat'],
                  hores: row['Hores'],
                  uc: []
                };
              }

              results[cp].uc.push({
                codi: row['Competències'],
                nom: row['Descripció de la competència'],
                durada: row['Durada']
              });
            })
            .on('end', () => {
              fs.mkdirSync('public', { recursive: true });
              fs.writeFileSync(
                'public/data_cp.json',
                JSON.stringify(Object.values(results), null, 2)
              );
            });
          EOF

      - name: Commit JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add public/data_cp.json
          git commit -m "Auto build CP JSON" || echo "No changes"
          git push
