name: Build CP JSON

on:
  push:
    paths:
      - 'data/*.csv'
      - '.github/workflows/build-data.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install csv parser
        run: npm install csvtojson
        
      - name: Convert CSV to structured JSON
        run: |
          node -e "
          const csv=require('csvtojson');
          const fs=require('fs');

          function clean(str){
            return (str||'')
              .toString()
              .normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .trim()
              .toLowerCase();
          }

          csv({
            delimiter: ';'
          })
            .fromFile('data/cp_uc_base.csv')
            .then(rows=>{
              const grouped = {};

              rows.forEach(r=>{
                const keys = Object.keys(r);

                const get = (match) =>
                  r[keys.find(k => clean(k).includes(match))];

                const cp = get('certificat');
                const nom = get('descrip');
                const nivell = get('nivell');
                const familia = get('fam');
                const hores = get('hores');
                const uc = get('competenc');
                const ucDesc = get('descripcio de la compet');
                const durada = get('durada');

                if(!cp) return;

                if(!grouped[cp]){
                  grouped[cp] = {
                    codi: cp,
                    nom: nom || null,
                    nivell: Number(nivell) || null,
                    familia: familia || null,
                    hores: Number(hores) || null,
                    competencies: []
                  };
                }

                if(uc){
                  grouped[cp].competencies.push({
                    codi: uc,
                    descripcio: ucDesc || null,
                    durada: Number(durada) || null
                  });
                }
              });

              const result = Object.values(grouped);

              if (!fs.existsSync('public')){
                fs.mkdirSync('public');
              }

              fs.writeFileSync(
                'public/data_cp.json',
                JSON.stringify(result, null, 2)
              );
            });
          "

      - name: Commit JSON if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/data_cp.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update structured data_cp.json"
          git pull --rebase
          git push
