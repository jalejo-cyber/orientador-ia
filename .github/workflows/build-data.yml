name: Build CP JSON

on:
  push:
    paths:
      - 'data/*.csv'
      - '.github/workflows/build-data.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Convert CSV to structured JSON
        run: |
          node -e "
          const fs = require('fs');

          const raw = fs.readFileSync('data/cp_uc_base.csv', 'utf8');
          const lines = raw.split('\n').filter(l => l.trim());

          const headers = lines[0].split(';').map(h => h.trim());

          const grouped = {};

          for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(';');

            if (cols.length < 3) continue;

            const row = {};
            headers.forEach((h, index) => {
              row[h] = cols[index];
            });

            const cp = row['Certificat de Professionalitat'];
            if (!cp) continue;

            if (!grouped[cp]) {
              grouped[cp] = {
                codi: cp,
                nom: row['Descripció'] || null,
                nivell: Number(row['NivellEspecialitat']) || null,
                familia: row['FamProfDescCat'] || null,
                hores: Number(row['Hores']) || null,
                competencies: []
              };
            }

            if (row['Competències']) {
              grouped[cp].competencies.push({
                codi: row['Competències'],
                descripcio: row['Descripció de la competència'] || null,
                durada: Number(row['Durada']) || null
              });
            }
          }

          const result = Object.values(grouped);

          if (!fs.existsSync('public')) {
            fs.mkdirSync('public');
          }

          fs.writeFileSync(
            'public/data_cp.json',
            JSON.stringify(result, null, 2)
          );
          "

      - name: Commit JSON if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/data_cp.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update structured data_cp.json"
          git pull --rebase
          git push
