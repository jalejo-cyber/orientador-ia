name: Build CP JSON

on:
  push:
    paths:
      - 'data/*.csv'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install csv parser
        run: npm install csvtojson

      - name: Convert CSV to structured JSON
        run: |
          node -e "
          const csv=require('csvtojson');
          const fs=require('fs');

          csv()
            .fromFile('data/cp_uc_base.csv')
            .then(rows=>{
              const grouped = {};

              rows.forEach(r=>{
                const cp = r['Certificat de Professionalitat'];

                if(!grouped[cp]){
                  grouped[cp] = {
                    codi: cp,
                    nom: r['Descripció'],
                    nivell: Number(r['NivellEspecialitat']) || null,
                    familia: r['FamProfDescCat'],
                    hores: Number(r['Hores']) || null,
                    competencies: []
                  };
                }

                if(r['Competències']){
                  grouped[cp].competencies.push({
                    codi: r['Competències'],
                    descripcio: r['Descripció de la competència'],
                    durada: Number(r['Durada']) || null
                  });
                }
              });

              const result = Object.values(grouped);

              fs.writeFileSync(
                'public/data_cp.json',
                JSON.stringify(result, null, 2)
              );
            });
          "

      - name: Commit JSON if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/data_cp.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update structured data_cp.json"
          git push
