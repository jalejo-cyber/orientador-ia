name: Build CP JSON

on:
  push:
    paths:
      - 'data/*.csv'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install csv parser
        run: npm install csvtojson

      - name: Convert CSV to JSON
        run: |
          node -e "
          const csv=require('csvtojson');
          const fs=require('fs');
          csv()
            .fromFile('data/cp_uc_base.csv')
            .then(json=>{
              fs.writeFileSync('public/data_cp.json', JSON.stringify(json,null,2));
            });
          "

      - name: Commit JSON if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/data_cp.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update data_cp.json"
          git push
