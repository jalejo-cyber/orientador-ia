<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orientador Certificats Professionals</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
  <h1>Orientador de Certificats Professionals</h1>
  <p class="subtitle">Sistema d’orientació basat en unitats de competència (SOC)</p>

  <div class="progress">
    <div id="progressFill"></div>
  </div>
  <div class="progress-text" id="progressText">Pas 1 de 3</div>

  <!-- PAS 1 -->
  <section id="step1" class="step step-active">
    <h2>1. Família professional</h2>
    <div id="familyGrid" class="family-grid"></div>
    <div class="buttons">
      <button id="s1Next" class="btn primary">Següent</button>
    </div>
  </section>

  <!-- PAS 2 -->
  <section id="step2" class="step">
    <h2>2. Experiència professional</h2>

    <label>Anys d'experiència</label>
    <input type="range" id="yearsFamily" min="0" max="15" value="0">
    <div><strong><span id="yearsFamilyLabel">0</span></strong> anys</div>

    <label>Descriu tasques o funcions realitzades</label>
    <textarea id="freeText" rows="5"></textarea>

    <label>Pujar CV (PDF o TXT)</label>
    <input type="file" id="cvUpload" accept=".pdf,.txt">

    <div class="buttons">
      <button id="s2Back" class="btn">Enrere</button>
      <button id="s2Next" class="btn primary">Següent</button>
    </div>
  </section>

  <!-- PAS 3 -->
  <section id="step3" class="step">
    <h2>3. Formació</h2>

    <label>Nivell formatiu</label>
    <select id="formalEdu">
      <option value="">Selecciona...</option>
      <option value="cap">Sense titulació</option>
      <option value="eso">ESO</option>
      <option value="fp1">CFGM</option>
      <option value="fp2">CFGS</option>
      <option value="batx">Batxillerat</option>
      <option value="grau">Universitat</option>
    </select>

    <label>Cursos no reglats (hores totals)</label>
    <input type="number" id="nonFormalHours" placeholder="Exemple: 120">

    <div class="buttons">
      <button id="s3Back" class="btn">Enrere</button>
      <button id="calcBtn" class="btn primary">Calcular orientació</button>
    </div>
  </section>

  <!-- RESULTATS -->
  <section id="resultSection" class="hidden">
    <h2>Resultats d’orientació</h2>
    <div id="resultList"></div>

    <div style="margin-top:20px;">
      <button id="restartBtn" class="btn">Reiniciar</button>
      <button id="generateReportBtn" class="btn primary">
        Generar informe tècnic PDF
      </button>
    </div>
  </section>

</div>

<!-- Llibreries externes -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- App -->
<script src="app.js"></script>

</body>
</html>
