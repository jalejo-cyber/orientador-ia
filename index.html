<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema digital d’orientació</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#7A1E2C;
  --bg:#F4F5F7;
  --text:#2F2F2F;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:900px;
  margin:60px auto;
  background:white;
  padding:40px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

h1{
  margin-top:0;
  font-weight:600;
}

.step{
  margin-top:35px;
}

.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:15px;
}

.card{
  border:1px solid #ddd;
  padding:20px;
  border-radius:10px;
  cursor:pointer;
  transition:all .2s ease;
}

.card:hover{
  border-color:var(--primary);
}

.card.selected{
  border:2px solid var(--primary);
}

label{
  display:block;
  margin-top:15px;
  font-weight:500;
}

input, select, textarea{
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  margin-top:25px;
  background:var(--primary);
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#5f1723;
}

.result{
  margin-top:40px;
  padding:30px;
  border-radius:12px;
  background:#fff;
  box-shadow:0 8px 25px rgba(0,0,0,0.06);
  display:none;
}

.result h2{
  color:var(--primary);
}

.fade{
  animation:fadeIn .4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>Sistema digital d’orientació</h1>
<p>Eina orientativa no vinculant · Catalunya</p>

<!-- PAS 1 -->
<div class="step">
<h2>1. Àmbit professional</h2>

<div class="cards">
  <div class="card" data-value="Administració i gestió">Administració i gestió</div>
  <div class="card" data-value="Electricitat i electrònica">Electricitat i electrònica</div>
  <div class="card" data-value="Hostaleria i turisme">Hostaleria i turisme</div>
  <div class="card" data-value="Informàtica i comunicacions">Informàtica i comunicacions</div>
</div>
</div>

<!-- PAS 2 -->
<div class="step">
<h2>2. Experiència professional</h2>

<label>Anys d'experiència aproximats</label>
<input type="number" id="experience" min="0" max="40">

<label>Funcions realitzades (breu descripció)</label>
<textarea id="tasks"></textarea>
</div>

<!-- PAS 3 -->
<div class="step">
<h2>3. Formació</h2>

<label>Nivell formatiu</label>
<select id="education">
  <option value="">Selecciona</option>
  <option>ESO / Graduat escolar</option>
  <option>Batxillerat</option>
  <option>FP Grau Mitjà</option>
  <option>FP Grau Superior</option>
  <option>Estudis universitaris</option>
</select>

<label>Hores aproximades de formació relacionada</label>
<input type="number" id="trainingHours">
</div>

<button onclick="calculate()">Obtenir orientació</button>

<!-- RESULTAT -->
<div id="result" class="result"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let selectedFamily = "";

document.querySelectorAll(".card").forEach(card=>{
  card.addEventListener("click", ()=>{
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
    card.classList.add("selected");
    selectedFamily = card.dataset.value;
  });
});

function calculate(){

  const exp = parseInt(document.getElementById("experience").value) || 0;
  const tasks = document.getElementById("tasks").value;
  const education = document.getElementById("education").value;
  const training = parseInt(document.getElementById("trainingHours").value) || 0;

  if(!selectedFamily){
    alert("Selecciona un àmbit professional.");
    return;
  }

  let level = "Nivell 1";

  if(exp >= 3 && training >= 200) level = "Nivell 2";
  if(exp >= 5 && training >= 400) level = "Nivell 3";

  const resultDiv = document.getElementById("result");
  resultDiv.classList.add("fade");
  resultDiv.style.display = "block";

  resultDiv.innerHTML = `
    <h2>Resultat orientatiu</h2>
    <p><strong>Àmbit:</strong> ${selectedFamily}</p>
    <p><strong>Nivell recomanat:</strong> ${level}</p>
    <p style="margin-top:15px;font-size:14px;color:#555;">
      Aquest resultat és orientatiu i no substitueix la validació oficial del procediment d’acreditació.
    </p>
    <button onclick="downloadPDF('${level}','${selectedFamily}',${exp},'${education}',${training},'${tasks.replace(/'/g,"")}')">
      Descarregar informe en PDF
    </button>
  `;

  resultDiv.scrollIntoView({behavior:"smooth"});
}

function downloadPDF(level,family,exp,education,training,tasks){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const today = new Date().toLocaleDateString("ca-ES");

  doc.setFontSize(18);
  doc.setFont("helvetica","bold");
  doc.text("Informe orientatiu d'acreditació de competències",20,20);

  doc.setFontSize(12);
  doc.setFont("helvetica","normal");
  doc.text("Centre emissor: Foment Formació",20,35);
  doc.text("Data: "+today,20,42);

  doc.line(20,48,190,48);

  doc.text("Àmbit professional: "+family,20,60);
  doc.text("Anys d'experiència: "+exp,20,68);
  doc.text("Nivell formatiu: "+education,20,76);
  doc.text("Hores formació: "+training,20,84);

  doc.text("Funcions descrites:",20,96);
  doc.text(tasks,20,104,{maxWidth:170});

  doc.setFont("helvetica","bold");
  doc.text("Resultat orientatiu: "+level,20,130);

  doc.setFont("helvetica","normal");
  doc.text(
    "Aquest informe és orientatiu i no substitueix la validació oficial del procediment d'acreditació.",
    20,
    145,
    {maxWidth:170}
  );

  doc.save("Informe_orientatiu_Foment_Formacio.pdf");
}

</script>

</body>
</html>
