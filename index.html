<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orientador Certificats Professionals</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>Orientador de Certificats Professionals</h1>
  <p class="subtitle">Sistema híbrid basat en competències (SOC)</p>

  <div class="progress">
    <div id="progressFill"></div>
  </div>
  <div class="progress-text" id="progressText">Pas 1 de 3</div>

  <section id="step1" class="step step-active">
    <h2>1. Família professional</h2>
    <div id="familyGrid" class="family-grid"></div>
    <div class="buttons">
      <button id="s1Next" class="btn primary">Següent</button>
    </div>
  </section>

  <section id="step2" class="step">
    <h2>2. Experiència</h2>

    <label>Anys d'experiència</label>
    <input type="range" id="yearsFamily" min="0" max="15" value="0">
    <div>Valor: <span id="yearsFamilyLabel">0</span></div>

    <label>Descriu tasques o funcions</label>
    <textarea id="freeText" rows="4"></textarea>

    <div class="buttons">
      <button id="s2Back" class="btn">Enrere</button>
      <button id="s2Next" class="btn primary">Següent</button>
    </div>
  </section>

  <section id="step3" class="step">
    <h2>3. Formació</h2>

    <label>Nivell formatiu</label>
    <select id="formalEdu">
      <option value="">Selecciona...</option>
      <option value="cap">Sense titulació</option>
      <option value="eso">ESO</option>
      <option value="fp1">CFGM</option>
      <option value="fp2">CFGS / Universitat</option>
    </select>

    <div class="buttons">
      <button id="s3Back" class="btn">Enrere</button>
      <button id="calcBtn" class="btn primary">Calcular orientació</button>
    </div>
  </section>

  <section id="resultSection" class="hidden">
    <h2>Resultats</h2>
    <div id="resultList"></div>
    <button id="restartBtn" class="btn">Reiniciar</button>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
